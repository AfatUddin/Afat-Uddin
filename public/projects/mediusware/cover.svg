<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Mediusware APIs and HR system cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06121f"/>
      <stop offset="55%" stop-color="#0d2540"/>
      <stop offset="100%" stop-color="#102f56"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5b6cff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5b6cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5b6cff"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#dots)"/>
  <circle cx="220" cy="200" r="380" fill="url(#glowA)"/>
  <circle cx="1380" cy="820" r="420" fill="url(#glowB)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <text x="100" y="170" fill="#ffffff" fill-opacity="0.55" font-size="22" letter-spacing="6" font-weight="600">CASE&#160;STUDY&#160;·&#160;PUBLIC&#160;APIS&#160;+&#160;DJANGO-ADMIN&#160;HR&#160;SYSTEM</text>
    <text x="100" y="280" fill="#ffffff" font-size="96" font-weight="700" letter-spacing="-2">Mediusware</text>
    <text x="100" y="380" fill="#ffffff" font-size="96" font-weight="700" letter-spacing="-2">APIs &amp; HR System</text>
    <text x="100" y="450" fill="#ffffff" fill-opacity="0.7" font-size="28" font-weight="500">Django · DRF · Django Admin · Celery · PostgreSQL · Docker</text>
    <rect x="100" y="490" width="220" height="6" rx="3" fill="url(#accent)"/>
  </g>

  <!-- API endpoints panel (left split) -->
  <g filter="url(#shadow)" transform="translate(840,140)">
    <rect width="660" height="200" rx="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12"/>
    <g transform="translate(28,28)">
      <circle cx="0" cy="0" r="6" fill="#ff5f56"/>
      <circle cx="20" cy="0" r="6" fill="#ffbd2e"/>
      <circle cx="40" cy="0" r="6" fill="#27c93f"/>
      <text x="80" y="5" font-size="14" fill="#ffffff" fill-opacity="0.55" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace">api.mediusware.com</text>
      <text x="540" y="5" font-size="11" letter-spacing="2" font-weight="700" fill="#5b6cff" font-family="Inter">TRACK&#160;A</text>
    </g>
    <g transform="translate(28,72)" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">
      <text y="0"><tspan fill="#22c55e" font-weight="700">GET</tspan>    <tspan fill="#ffffff" fill-opacity="0.92">/api/v1/leads/</tspan></text>
      <text y="30"><tspan fill="#5b6cff" font-weight="700">POST</tspan>   <tspan fill="#ffffff" fill-opacity="0.92">/api/v1/contact/</tspan></text>
      <text y="60"><tspan fill="#22c55e" font-weight="700">GET</tspan>    <tspan fill="#ffffff" fill-opacity="0.92">/api/v1/blog/posts/</tspan></text>
      <text y="90"><tspan fill="#d6a85a" font-weight="700">PATCH</tspan>  <tspan fill="#ffffff" fill-opacity="0.92">/api/v1/admin/leads/{id}/</tspan></text>
    </g>
  </g>

  <!-- Django Admin HR panel -->
  <g filter="url(#shadow)" transform="translate(840,360)">
    <rect width="660" height="320" rx="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12"/>
    <g transform="translate(28,28)">
      <rect width="14" height="14" rx="3" fill="#22c55e"/>
      <text x="26" y="12" font-size="14" fill="#ffffff" fill-opacity="0.7" font-family="Inter" font-weight="600">Django Admin · HR</text>
      <text x="540" y="12" font-size="11" letter-spacing="2" font-weight="700" fill="#22c55e" font-family="Inter">TRACK&#160;B</text>
    </g>

    <!-- table mock -->
    <g transform="translate(28,60)" font-family="Inter, ui-sans-serif">
      <rect width="604" height="40" rx="8" fill="#ffffff" fill-opacity="0.06"/>
      <text x="16" y="25" font-size="12" letter-spacing="2" font-weight="700" fill="#ffffff" fill-opacity="0.65">EMPLOYEE</text>
      <text x="220" y="25" font-size="12" letter-spacing="2" font-weight="700" fill="#ffffff" fill-opacity="0.65">DEPT</text>
      <text x="340" y="25" font-size="12" letter-spacing="2" font-weight="700" fill="#ffffff" fill-opacity="0.65">ATTEND</text>
      <text x="450" y="25" font-size="12" letter-spacing="2" font-weight="700" fill="#ffffff" fill-opacity="0.65">SALARY</text>
      <text x="555" y="25" font-size="12" letter-spacing="2" font-weight="700" fill="#ffffff" fill-opacity="0.65">PAY</text>
    </g>
    <g transform="translate(28,108)" font-family="Inter, ui-sans-serif" font-size="14">
      <g><text x="16" y="20" fill="#ffffff" fill-opacity="0.92">Aria L.</text><text x="220" y="20" fill="#ffffff" fill-opacity="0.7">Engineering</text><text x="340" y="20" fill="#ffffff" fill-opacity="0.7">22/22</text><text x="450" y="20" fill="#ffffff" fill-opacity="0.92">$3,200</text><circle cx="565" cy="15" r="6" fill="#22c55e"/></g>
      <g transform="translate(0,40)"><text x="16" y="20" fill="#ffffff" fill-opacity="0.92">Marcus K.</text><text x="220" y="20" fill="#ffffff" fill-opacity="0.7">Sales</text><text x="340" y="20" fill="#ffffff" fill-opacity="0.7">21/22</text><text x="450" y="20" fill="#ffffff" fill-opacity="0.92">$2,800</text><circle cx="565" cy="15" r="6" fill="#22c55e"/></g>
      <g transform="translate(0,80)"><text x="16" y="20" fill="#ffffff" fill-opacity="0.92">Priya S.</text><text x="220" y="20" fill="#ffffff" fill-opacity="0.7">Design</text><text x="340" y="20" fill="#ffffff" fill-opacity="0.7">20/22</text><text x="450" y="20" fill="#ffffff" fill-opacity="0.92">$2,950</text><circle cx="565" cy="15" r="6" fill="#d6a85a"/></g>
      <g transform="translate(0,120)"><text x="16" y="20" fill="#ffffff" fill-opacity="0.92">Hasan R.</text><text x="220" y="20" fill="#ffffff" fill-opacity="0.7">Finance</text><text x="340" y="20" fill="#ffffff" fill-opacity="0.7">22/22</text><text x="450" y="20" fill="#ffffff" fill-opacity="0.92">$3,400</text><circle cx="565" cy="15" r="6" fill="#22c55e"/></g>
    </g>

    <!-- admin action -->
    <g transform="translate(28,272)">
      <rect width="280" height="34" rx="17" fill="#5b6cff"/>
      <text x="20" y="22" fill="#ffffff" font-family="Inter" font-size="13" font-weight="700">▸ Generate monthly salary sheet</text>
    </g>
    <text x="320" y="294" font-family="Inter" font-size="13" fill="#ffffff" fill-opacity="0.55">custom admin action</text>
  </g>

  <!-- KPI tiles -->
  <g filter="url(#shadow)" transform="translate(100,580)" font-family="Inter, ui-sans-serif">
    <g>
      <rect width="200" height="160" rx="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="46" font-size="12" letter-spacing="2" font-weight="700" fill="#ffffff" fill-opacity="0.6">EMPLOYEES</text>
      <text x="24" y="106" font-size="56" font-weight="700" fill="#ffffff">~100</text>
      <text x="24" y="138" font-size="13" fill="#ffffff" fill-opacity="0.55">managed in HR system</text>
    </g>
    <g transform="translate(220,0)">
      <rect width="200" height="160" rx="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="46" font-size="12" letter-spacing="2" font-weight="700" fill="#ffffff" fill-opacity="0.6">HR&#160;MODULES</text>
      <text x="24" y="106" font-size="56" font-weight="700" fill="#ffffff">6</text>
      <text x="24" y="138" font-size="13" fill="#ffffff" fill-opacity="0.55">Profile · Attend · Salary…</text>
    </g>
    <g transform="translate(440,0)">
      <rect width="200" height="160" rx="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="46" font-size="12" letter-spacing="2" font-weight="700" fill="#ffffff" fill-opacity="0.6">REST&#160;ENDPOINTS</text>
      <text x="24" y="106" font-size="56" font-weight="700" fill="#ffffff">30+</text>
      <text x="24" y="138" font-size="13" fill="#ffffff" fill-opacity="0.55">behind mediusware.com</text>
    </g>
  </g>

  <!-- chips + footer -->
  <g transform="translate(100,790)" font-family="Inter, ui-sans-serif">
    <g>
      <rect width="200" height="46" rx="23" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="26" cy="23" r="6" fill="#5b6cff"/>
      <text x="46" y="29" font-size="16" font-weight="600" fill="#ffffff">Django + DRF</text>
    </g>
    <g transform="translate(216,0)">
      <rect width="220" height="46" rx="23" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="26" cy="23" r="6" fill="#22c55e"/>
      <text x="46" y="29" font-size="16" font-weight="600" fill="#ffffff">Django Admin (HR)</text>
    </g>
    <g transform="translate(452,0)">
      <rect width="200" height="46" rx="23" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="26" cy="23" r="6" fill="#d6a85a"/>
      <text x="46" y="29" font-size="16" font-weight="600" fill="#ffffff">Celery + Redis</text>
    </g>

    <text x="0" y="100" font-size="14" letter-spacing="3" font-weight="600" fill="#ffffff" fill-opacity="0.55">2&#160;YEARS&#160;·&#160;DHAKA&#160;·&#160;CROSS-FUNCTIONAL&#160;TEAMS</text>
    <text x="0" y="160" font-size="48" font-weight="700" fill="#ffffff">mediusware.com</text>
  </g>
</svg>
